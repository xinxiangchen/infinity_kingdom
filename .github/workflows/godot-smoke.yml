name: Godot Smoke

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip
          unzip -q godot.zip -d godot
          chmod +x godot/Godot_v4.6.3-stable_linux.x86_64
          echo "$PWD/godot" >> "$GITHUB_PATH"

      - name: Import project
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --import

      - name: Boot check
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --quit

      - name: Accessory flow smoke test
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --script res://tests/smoke_accessory_flow.gd

      - name: Accessory catalog smoke test
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --script res://tests/smoke_accessory_catalog.gd

      - name: Run effects smoke test
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --script res://tests/smoke_run_effects.gd

      - name: Player control smoke test
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --script res://tests/smoke_player_control.gd

      - name: Run flow smoke test
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --script res://tests/smoke_run_flow.gd

      - name: Simplified Chinese locale smoke test
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --script res://tests/smoke_locale_zh_hans.gd

      - name: UI screens smoke test
        run: Godot_v4.6.3-stable_linux.x86_64 --headless --path . --script res://tests/smoke_ui_screens.gd
